<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 旅行规划器 Pro</title>
<style>
/* =============================================
   CSS Custom Properties
   ============================================= */
:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --surface-alt: #faf9f7;
  --border: #e7e5e0;
  --text: #2c2c2c;
  --text-secondary: #6b6b6b;
  --text-muted: #999999;
  --primary: #e8773b;
  --primary-hover: #d0682d;
  --primary-light: #fef0e8;
  --success: #3b9e6d;
  --success-light: #edf7f2;
  --danger: #e05555;
  --danger-light: #fef0f0;
  --info: #4a90d9;
  --info-light: #edf4fc;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --sidebar-w: 240px;
}

/* =============================================
   Reset & Base
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
}

button { cursor: pointer; font-family: inherit; border: none; outline: none; }
input, textarea, select { font-family: inherit; outline: none; }
a { color: var(--info); text-decoration: none; }
a:hover { text-decoration: underline; }
img { max-width: 100%; }

/* =============================================
   Sidebar
   ============================================= */
.sidebar {
  width: var(--sidebar-w);
  height: 100vh;
  position: fixed;
  left: 0; top: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 24px 16px;
  z-index: 100;
  transition: transform var(--transition);
}
.sidebar-logo {
  font-size: 22px; font-weight: 700;
  padding: 0 12px 24px;
  display: flex; align-items: center; gap: 10px;
}
.sidebar-nav { flex: 1; display: flex; flex-direction: column; gap: 4px; }

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500;
  color: var(--text-secondary);
  background: transparent;
  transition: all var(--transition);
  text-align: left;
  width: 100%;
}
.nav-item:hover { background: var(--bg); color: var(--text); }
.nav-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.nav-item .icon { font-size: 18px; width: 24px; text-align: center; }

.sidebar-footer {
  border-top: 1px solid var(--border);
  padding-top: 16px;
  display: flex; flex-direction: column; gap: 4px;
}

.sidebar-tip {
  margin-top: 8px;
  padding: 10px 12px;
  background: var(--info-light);
  border-radius: var(--radius-sm);
  font-size: 11px;
  color: var(--info);
  line-height: 1.5;
}

/* =============================================
   Main Content
   ============================================= */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  padding: 32px 40px;
  max-width: 1120px;
}

/* =============================================
   Page Header
   ============================================= */
.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 28px;
  flex-wrap: wrap; gap: 16px;
}
.page-title { font-size: 28px; font-weight: 700; }
.page-subtitle { color: var(--text-secondary); font-size: 15px; margin-top: 4px; }

/* =============================================
   Buttons
   ============================================= */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 600;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(232,119,59,0.3); }
.btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg); }
.btn-danger { background: var(--danger-light); color: var(--danger); }
.btn-danger:hover { background: #fde0e0; }
.btn-info { background: var(--info); color: #fff; }
.btn-info:hover { background: #3a7dc8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,144,217,0.3); }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.btn-xs { padding: 4px 8px; font-size: 12px; border-radius: 6px; }
.btn-icon { width: 36px; height: 36px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: var(--radius-sm); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

/* =============================================
   Cards
   ============================================= */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 24px;
  transition: all var(--transition);
}
.card:hover { box-shadow: var(--shadow); }

/* Trip Cards */
.trip-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
}

.trip-card {
  cursor: pointer;
  position: relative;
  overflow: hidden;
  padding: 0;
  border: none;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}
.trip-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.trip-card-header {
  height: 160px;
  background-size: cover;
  background-position: center;
  display: flex; align-items: flex-end;
  padding: 20px 24px;
  position: relative;
}
.trip-card-header::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(transparent 40%, rgba(0,0,0,0.65));
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}
.trip-card-title { font-size: 22px; font-weight: 700; color: #fff; position: relative; z-index: 1; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
.trip-card-country { font-size: 13px; color: rgba(255,255,255,0.9); position: relative; z-index: 1; }
.trip-card-badge {
  position: absolute; top: 16px; right: 16px; z-index: 2;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(4px);
  color: var(--text);
  font-size: 11px; font-weight: 700;
  padding: 4px 10px;
  border-radius: 12px;
}
.trip-card-body { padding: 20px 24px; background: var(--surface); border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
.trip-card-dates {
  font-size: 13px; color: var(--text-secondary);
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 12px;
}
.trip-card-meta {
  display: flex; flex-wrap: wrap; gap: 18px;
  font-size: 13px; color: var(--text-secondary);
}
.trip-card-meta span { display: flex; align-items: center; gap: 4px; }
.trip-card-photo-credit {
  position: absolute; bottom: 8px; left: 20px; z-index: 2;
  font-size: 10px; color: rgba(255,255,255,0.6);
}

/* =============================================
   Empty State
   ============================================= */
.empty-state {
  text-align: center; padding: 80px 20px;
}
.empty-state .icon { font-size: 72px; margin-bottom: 20px; display: block; }
.empty-state h3 { font-size: 22px; margin-bottom: 8px; }
.empty-state p { color: var(--text-secondary); margin-bottom: 28px; max-width: 420px; margin-left: auto; margin-right: auto; font-size: 15px; }

/* =============================================
   Modal
   ============================================= */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.modal {
  background: var(--surface);
  border-radius: var(--radius-xl);
  width: 90%;
  max-width: 580px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.25s ease;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--surface);
  z-index: 1;
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}
.modal-header h2 { font-size: 18px; font-weight: 700; }
.modal-body { padding: 24px; }
.modal-footer {
  display: flex; justify-content: flex-end; gap: 12px;
  padding: 16px 24px;
  border-top: 1px solid var(--border);
}

/* =============================================
   Form Elements
   ============================================= */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--surface-alt);
  transition: all var(--transition);
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
  background: var(--surface);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-error { color: var(--danger); font-size: 12px; margin-top: 4px; }

/* =============================================
   Hero Image Section
   ============================================= */
.hero-section {
  position: relative;
  border-radius: var(--radius-xl);
  overflow: hidden;
  margin-bottom: 28px;
  height: 240px;
  background-size: cover;
  background-position: center;
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.5) 100%);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 28px 32px;
}
.hero-title { font-size: 32px; font-weight: 700; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.hero-subtitle { font-size: 15px; color: rgba(255,255,255,0.9); margin-top: 4px; }
.hero-photo-credit {
  position: absolute; bottom: 12px; right: 20px;
  font-size: 10px; color: rgba(255,255,255,0.5);
}
.hero-loading {
  display: flex; align-items: center; justify-content: center;
  height: 100%;
  background: var(--surface-alt);
  border-radius: var(--radius-xl);
  border: 1px solid var(--border);
}
.hero-loading .spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* =============================================
   Photo Gallery
   ============================================= */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-top: 16px;
}
.photo-item {
  aspect-ratio: 4/3;
  border-radius: var(--radius);
  background-size: cover;
  background-position: center;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.photo-item:hover { transform: scale(1.03); box-shadow: var(--shadow); }
.photo-item::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(transparent 60%, rgba(0,0,0,0.3));
  opacity: 0; transition: opacity var(--transition);
}
.photo-item:hover::after { opacity: 1; }

/* =============================================
   Tabs
   ============================================= */
.tabs {
  display: flex; gap: 4px;
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 20px;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 13px; font-weight: 600;
  white-space: nowrap;
  background: var(--surface);
  color: var(--text-secondary);
  border: 1px solid var(--border);
  transition: all var(--transition);
}
.tab:hover { background: var(--bg); }
.tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* =============================================
   Activity Items
   ============================================= */
.activity-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.activity-item {
  display: flex; align-items: flex-start; gap: 14px;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  transition: all var(--transition);
}
.activity-item:hover { border-color: #d0cdc6; }
.activity-time {
  font-size: 13px; font-weight: 700; color: var(--primary);
  min-width: 56px; text-align: center;
  padding: 4px 8px; background: var(--primary-light);
  border-radius: 6px;
}
.activity-type { font-size: 24px; min-width: 32px; text-align: center; }
.activity-info { flex: 1; min-width: 0; }
.activity-info h4 { font-size: 14px; font-weight: 600; }
.activity-info p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
.activity-info .location { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; margin-top: 4px; }
.activity-cost { font-weight: 600; font-size: 13px; color: var(--text); }
.activity-actions { display: flex; gap: 4px; flex-shrink: 0; }

/* =============================================
   Budget
   ============================================= */
.budget-summary {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.budget-stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
}
.budget-stat .label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.budget-stat .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
.budget-stat .value.over { color: var(--danger); }

.progress-bar {
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s ease;
}
.progress-fill.safe { background: var(--success); }
.progress-fill.warning { background: #f0a040; }
.progress-fill.danger { background: var(--danger); }

.category-grid { display: flex; flex-direction: column; gap: 12px; }
.category-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.category-icon { font-size: 20px; width: 28px; text-align: center; }
.category-info { flex: 1; min-width: 0; }
.category-name { font-size: 14px; font-weight: 600; }
.category-amounts { font-size: 12px; color: var(--text-secondary); }
.category-bar { width: 120px; }

/* =============================================
   Packing List
   ============================================= */
.packing-progress {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 20px;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.packing-progress .bar { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
.packing-progress .bar-fill { height: 100%; background: var(--success); border-radius: 5px; transition: width 0.3s ease; }
.packing-progress .text { font-size: 14px; font-weight: 600; white-space: nowrap; }

.packing-category { margin-bottom: 24px; }
.packing-category h3 {
  font-size: 14px; font-weight: 700; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.packing-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  font-size: 14px;
}
.packing-item input[type="checkbox"] {
  width: 18px; height: 18px;
  accent-color: var(--primary);
  cursor: pointer;
}
.packing-item .checked { text-decoration: line-through; color: var(--text-muted); }

/* =============================================
   Explore / Research Section
   ============================================= */
.explore-section { margin-bottom: 28px; }
.explore-section h2 {
  font-size: 18px; font-weight: 700;
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}

.info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  line-height: 1.7;
}
.info-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.info-card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }

.skeleton {
  background: linear-gradient(90deg, var(--border) 25%, transparent 50%, var(--border) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: var(--radius-sm);
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-text { height: 14px; margin-bottom: 8px; }
.skeleton-text:last-child { width: 60%; }
.skeleton-title { height: 20px; width: 40%; margin-bottom: 16px; }

/* Weather */
.weather-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 10px;
}
.weather-day {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 10px;
  text-align: center;
}
.weather-day .day { font-size: 12px; font-weight: 700; color: var(--text-secondary); margin-bottom: 6px; }
.weather-day .icon { font-size: 28px; margin-bottom: 4px; }
.weather-day .temp { font-size: 14px; font-weight: 700; }
.weather-day .temp-lo { font-size: 12px; color: var(--text-muted); }

/* Attractions */
.attraction-list { display: flex; flex-direction: column; gap: 10px; }
.attraction-item {
  display: flex; gap: 14px;
  padding: 14px 16px;
  background: var(--surface-alt);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all var(--transition);
  cursor: pointer;
}
.attraction-item:hover { border-color: var(--primary); background: var(--primary-light); }
.attraction-num {
  width: 32px; height: 32px;
  background: var(--primary);
  color: #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  flex-shrink: 0;
}
.attraction-info h4 { font-size: 14px; font-weight: 600; }
.attraction-info p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* =============================================
   Toast
   ============================================= */
.toast-container {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 300;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  background: var(--text);
  color: #fff;
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500;
  animation: slideUp 0.3s ease;
  box-shadow: var(--shadow-lg);
  max-width: 340px;
}

/* =============================================
   Responsive
   ============================================= */
@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
    box-shadow: var(--shadow-lg);
  }
  .sidebar.open { transform: translateX(0); }
  .main {
    margin-left: 0;
    padding: 20px 16px;
  }
  .page-header { flex-direction: column; align-items: flex-start; }
  .trip-grid { grid-template-columns: 1fr; }
  .budget-summary { grid-template-columns: 1fr; }
  .category-bar { width: 80px; }
  .form-row { grid-template-columns: 1fr; }
  .hero-section { height: 180px; }
  .hero-title { font-size: 24px; }
  .photo-grid { grid-template-columns: repeat(2, 1fr); }
  .weather-grid { grid-template-columns: repeat(3, 1fr); }
  .mobile-menu-btn {
    display: flex !important;
  }
}
.mobile-menu-btn {
  display: none;
  position: fixed; top: 16px; left: 16px; z-index: 150;
  width: 40px; height: 40px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: var(--shadow-sm);
}

/* Style chips */
.style-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.style-chip {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px; font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
}
.style-chip:hover { border-color: var(--primary); }
.style-chip.selected { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }

/* AI generation loading */
.ai-loading {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 48px 24px; text-align: center;
}
.ai-loading .spinner {
  width: 48px; height: 48px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
.ai-loading .status { font-size: 14px; color: var(--text-secondary); }
.ai-badge {
  display: inline-block;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  font-size: 10px; font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  margin-left: 6px;
  vertical-align: middle;
}
</style>
</head>
<body>

</aside>

<!-- =============================================
     Main Content
     ============================================= -->
<main class="main" id="main-content"></main>

<!-- Modal Container -->
<div id="modal-container"></div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<!-- Hidden file input -->
<input type="file" id="import-file-input" accept=".json" style="display:none" onchange="handleImportFile(event)">

<script>
/* =============================================
   STATE MANAGEMENT
   ============================================= */
const STORAGE_KEY = 'travel-planner-pro-v2';

const defaultState = {
  trips: [],
  activeTripId: null,
  currentView: 'dashboard',
  llmConfig: { provider: 'deepseek', apiKey: '', model: 'deepseek-chat' }
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Migrate old data if needed
      if (!parsed.currentView) parsed.currentView = 'dashboard';
      parsed.trips.forEach(t => {
        if (!t.packing) t.packing = defaultPackingItems(t.tripType || 'city');
      });
      return parsed;
    }
  } catch (e) { /* ignore */ }
  return { ...defaultState, trips: [] };
}

let state = loadState();

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getLlmConfig() {
  return state.llmConfig || { provider: 'deepseek', apiKey: '', model: 'deepseek-chat' };
}

function saveLlmConfig(config) {
  state.llmConfig = { ...state.llmConfig, ...config };
  saveState();
}

function getActiveTrip() {
  return state.trips.find(t => t.id === state.activeTripId) || null;
}

/* =============================================
   HELPERS
   ============================================= */
function genId() { return 'trip_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }
function genActId() { return 'act_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }
function formatCurrency(n) { return '¥' + Number(n).toLocaleString('zh-CN', { minimumFractionDigits: 0 }); }
function formatDate(d) { if (!d) return ''; const dt = new Date(d + (d.includes('T') ? '' : 'T00:00:00')); return dt.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }); }
function formatDateFull(d) { if (!d) return ''; const dt = new Date(d + (d.includes('T') ? '' : 'T00:00:00')); return dt.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' }); }
function daysBetween(d1, d2) { const a = new Date(d1 + 'T00:00:00'), b = new Date(d2 + 'T00:00:00'); return Math.max(1, Math.floor((b - a) / 86400000) + 1); }
function escHtml(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

const TRIP_COLORS = [
  'linear-gradient(135deg, #e8773b, #f59960)',
  'linear-gradient(135deg, #4a90d9, #6db3f2)',
  'linear-gradient(135deg, #3b9e6d, #5dc98b)',
  'linear-gradient(135deg, #9b59b6, #bb7ed6)',
  'linear-gradient(135deg, #e74c3c, #f07070)',
  'linear-gradient(135deg, #1abc9c, #48d1b5)',
  'linear-gradient(135deg, #f39c12, #f7b84e)',
  'linear-gradient(135deg, #34495e, #5d7b9e)',
];

function tripColor(index) { return TRIP_COLORS[index % TRIP_COLORS.length]; }

const ACTIVITY_TYPES = [
  { key: 'flight', icon: '✈️', label: '交通' },
  { key: 'hotel', icon: '🏨', label: '住宿' },
  { key: 'food', icon: '🍽️', label: '美食' },
  { key: 'attraction', icon: '🎯', label: '景点' },
  { key: 'transport', icon: '🚗', label: '出行' },
  { key: 'photo', icon: '📸', label: '拍照' },
  { key: 'shopping', icon: '🛍️', label: '购物' },
  { key: 'other', icon: '📌', label: '其他' },
];

function actTypeIcon(key) { const t = ACTIVITY_TYPES.find(a => a.key === key); return t ? t.icon : '📌'; }
function actTypeLabel(key) { const t = ACTIVITY_TYPES.find(a => a.key === key); return t ? t.label : '其他'; }

/* =============================================
   DEFAULT PACKING
   ============================================= */
function defaultPackingItems(tripType) {
  const base = {
    documents: [
      { id: genId(), name: '护照/身份证', checked: false },
      { id: genId(), name: '机票/火车票', checked: false },
      { id: genId(), name: '酒店预订确认', checked: false },
      { id: genId(), name: '旅行保险单', checked: false },
      { id: genId(), name: '紧急联系人信息', checked: false },
    ],
    clothing: [],
    electronics: [
      { id: genId(), name: '手机及充电器', checked: false },
      { id: genId(), name: '充电宝', checked: false },
      { id: genId(), name: '耳机', checked: false },
      { id: genId(), name: '转换插头', checked: false },
    ],
    toiletries: [
      { id: genId(), name: '牙刷/牙膏', checked: false }, { id: genId(), name: '毛巾', checked: false },
      { id: genId(), name: '防晒霜', checked: false }, { id: genId(), name: '洗漱用品', checked: false },
    ],
    health: [
      { id: genId(), name: '常用药品', checked: false }, { id: genId(), name: '创可贴', checked: false },
      { id: genId(), name: '口罩', checked: false }, { id: genId(), name: '消毒湿巾', checked: false },
    ],
    misc: [
      { id: genId(), name: '现金/银行卡', checked: false }, { id: genId(), name: '水杯', checked: false },
      { id: genId(), name: '雨伞', checked: false }, { id: genId(), name: '零食', checked: false },
    ]
  };
  const clothingMap = {
    beach: ['泳衣', '沙滩裤/裙', '拖鞋', '太阳镜', '遮阳帽', '轻薄T恤'],
    mountain: ['登山鞋', '冲锋衣', '保暖内衣', '帽子/手套', '登山杖'],
    business: ['西装/正装', '衬衫 x2', '皮鞋', '领带/配饰'],
    city: ['外套', '舒适步行鞋', 'T恤 x3', '长裤/裙子', '睡衣'],
  };
  base.clothing = (clothingMap[tripType] || clothingMap.city).map(n => ({ id: genId(), name: n, checked: false }));
  return base;
}

/* =============================================
   NAVIGATION
   ============================================= */
function navigate(view) {
  state.currentView = view;
  saveState();
  render();
  document.getElementById('sidebar').classList.remove('open');
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

/* =============================================
   TOASTS
   ============================================= */
function showToast(message) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity 0.3s ease';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

/* =============================================
   MODAL
   ============================================= */
function showModal(title, bodyHtml, footerHtml = '') {
  const container = document.getElementById('modal-container');
  container.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <h2>${title}</h2>
          <button class="btn btn-icon btn-secondary" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">${bodyHtml}</div>
        ${footerHtml ? `<div class="modal-footer">${footerHtml}</div>` : ''}
      </div>
    </div>`;
}
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function showConfirm(title, message, onConfirm) {
  showModal(title, `<p style="font-size:15px;line-height:1.7">${message}</p>`,
    `<button class="btn btn-secondary" onclick="closeModal()">取消</button>
     <button class="btn btn-danger" id="confirm-btn">确认删除</button>`);
  setTimeout(() => {
    const btn = document.getElementById('confirm-btn');
    if (btn) btn.addEventListener('click', () => { closeModal(); onConfirm(); });
  }, 50);
}

/* =============================================
   IMPORT / EXPORT
   ============================================= */
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'travel-planner-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 数据已导出');
}

function importData() { document.getElementById('import-file-input').click(); }

function handleImportFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.trips || !Array.isArray(data.trips)) throw new Error('无效格式');
      showConfirm('导入数据',
        `即将导入 <strong>${data.trips.length}</strong> 个旅行计划。这将<strong>覆盖</strong>当前所有数据，确定继续吗？`,
        () => {
          state = { ...data, currentView: 'dashboard', activeTripId: null };
          state.trips.forEach(t => { if (!t.packing) t.packing = defaultPackingItems(t.tripType || 'city'); });
          saveState();
          render();
          showToast(`✅ 成功导入 ${data.trips.length} 个旅行计划`);
        });
    } catch (err) {
      showToast('❌ 文件格式无效，请选择正确的备份文件');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

/* =============================================
   TRIP CRUD
   ============================================= */
function createTrip(data) {
  const trip = {
    id: genId(),
    name: data.name,
    country: data.country || '',
    startDate: data.startDate,
    endDate: data.endDate,
    budget: Number(data.budget) || 0,
    travelers: Number(data.travelers) || 1,
    notes: data.notes || '',
    tripType: data.tripType || 'city',
    budgetType: data.budgetType || 'personal',
    travelStyles: data.travelStyles || [],
    colorIndex: state.trips.length,
    itinerary: {},
    expenses: [],
    packing: defaultPackingItems(data.tripType || 'city'),
    createdAt: new Date().toISOString()
  };
  const days = daysBetween(trip.startDate, trip.endDate);
  for (let i = 1; i <= days; i++) trip.itinerary[`Day ${i}`] = [];
  state.trips.push(trip);
  state.activeTripId = trip.id;
  saveState();
  render();
  return trip;
}

function updateTrip(tripId, data) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip) return;
  trip.name = data.name;
  trip.country = data.country || '';
  trip.startDate = data.startDate;
  trip.endDate = data.endDate;
  trip.budget = Number(data.budget) || 0;
  trip.travelers = Number(data.travelers) || 1;
  trip.notes = data.notes || '';
  trip.tripType = data.tripType || trip.tripType;
  trip.budgetType = data.budgetType || trip.budgetType || 'personal';
  trip.travelStyles = data.travelStyles || trip.travelStyles || [];
  const newDays = daysBetween(trip.startDate, trip.endDate);
  const oldDays = Object.keys(trip.itinerary).length;
  if (newDays > oldDays) {
    for (let i = oldDays + 1; i <= newDays; i++) trip.itinerary[`Day ${i}`] = [];
  } else if (newDays < oldDays) {
    for (let i = newDays + 1; i <= oldDays; i++) delete trip.itinerary[`Day ${i}`];
  }
  saveState();
  render();
}

function deleteTrip(tripId) {
  state.trips = state.trips.filter(t => t.id !== tripId);
  if (state.activeTripId === tripId) {
    state.activeTripId = state.trips.length > 0 ? state.trips[0].id : null;
    if (!state.activeTripId) state.currentView = 'dashboard';
  }
  saveState();
  render();
  showToast('🗑️ 旅行计划已删除');
}

/* =============================================
   ACTIVITY CRUD
   ============================================= */
function addActivity(tripId, day, activity) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip || !trip.itinerary[day]) return;
  trip.itinerary[day].push({
    id: genActId(),
    time: activity.time || '',
    title: activity.title,
    description: activity.description || '',
    location: activity.location || '',
    cost: Number(activity.cost) || 0,
    type: activity.type || 'other'
  });
  saveState();
  render();
}

function updateActivity(tripId, day, actId, data) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip || !trip.itinerary[day]) return;
  const act = trip.itinerary[day].find(a => a.id === actId);
  if (!act) return;
  Object.assign(act, {
    time: data.time || act.time, title: data.title,
    description: data.description || '', location: data.location || '',
    cost: Number(data.cost) || 0, type: data.type || act.type
  });
  saveState();
  render();
}

function deleteActivity(tripId, day, actId) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip || !trip.itinerary[day]) return;
  trip.itinerary[day] = trip.itinerary[day].filter(a => a.id !== actId);
  saveState();
  render();
}

function moveActivity(tripId, day, actId, direction) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip || !trip.itinerary[day]) return;
  const arr = trip.itinerary[day];
  const idx = arr.findIndex(a => a.id === actId);
  if (idx === -1) return;
  const newIdx = idx + direction;
  if (newIdx < 0 || newIdx >= arr.length) return;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  saveState();
  render();
}

function editActivityById(tripId, day, actId) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip || !trip.itinerary[day]) return;
  const activity = trip.itinerary[day].find(a => a.id === actId);
  if (activity) showActivityForm(tripId, day, activity);
}

/* =============================================
   EXPENSE CRUD
   ============================================= */
const EXPENSE_CATEGORIES = ['transport', 'accommodation', 'food', 'activities', 'shopping', 'other'];
const CATEGORY_LABELS = {
  transport: '🚗 交通', accommodation: '🏨 住宿', food: '🍽️ 餐饮',
  activities: '🎯 活动', shopping: '🛍️ 购物', other: '📌 其他'
};

function addExpense(tripId, expense) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip) return;
  trip.expenses.push({ id: genId(), amount: Number(expense.amount) || 0, category: expense.category, date: expense.date || '', note: expense.note || '' });
  saveState();
  render();
}

function deleteExpense(tripId, expId) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip) return;
  trip.expenses = trip.expenses.filter(e => e.id !== expId);
  saveState();
  render();
}

function getCategoryTotal(trip, category) { return trip.expenses.filter(e => e.category === category).reduce((sum, e) => sum + e.amount, 0); }
function getItineraryCost(trip) { let total = 0; Object.values(trip.itinerary).forEach(acts => { acts.forEach(a => { total += a.cost || 0; }); }); return total; }
function getTotalSpent(trip) { return trip.expenses.reduce((sum, e) => sum + e.amount, 0) + getItineraryCost(trip); }

/* =============================================
   PACKING
   ============================================= */
function togglePackingItem(tripId, category, itemId) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip || !trip.packing || !trip.packing[category]) return;
  const item = trip.packing[category].find(i => i.id === itemId);
  if (item) item.checked = !item.checked;
  saveState();
  render();
}
function addPackingItem(tripId, category, name) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip || !trip.packing[category]) return;
  trip.packing[category].push({ id: genId(), name, checked: false });
  saveState();
  render();
}
function deletePackingItem(tripId, category, itemId) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip || !trip.packing[category]) return;
  trip.packing[category] = trip.packing[category].filter(i => i.id !== itemId);
  saveState();
  render();
}
function getPackingStats(trip) {
  let total = 0, packed = 0;
  if (!trip.packing) return { total: 0, packed: 0, pct: 0 };
  Object.values(trip.packing).forEach(items => { items.forEach(i => { total++; if (i.checked) packed++; }); });
  return { total, packed, pct: total > 0 ? Math.round((packed / total) * 100) : 0 };
}

/* =============================================
   MODAL FORMS
   ============================================= */
function showFieldError(id, msg) { const el = document.getElementById(id); if (el) { el.textContent = msg; el.style.display = 'block'; } }

/* Travel style options */
const TRAVEL_STYLES = [
  { key: 'food', icon: '🍽️', label: '美食之旅' },
  { key: 'photography', icon: '📸', label: '摄影打卡' },
  { key: 'shopping', icon: '🛍️', label: '购物血拼' },
  { key: 'culture', icon: '🏛️', label: '历史文化' },
  { key: 'nature', icon: '🌿', label: '自然风光' },
  { key: 'adventure', icon: '🏃', label: '户外探险' },
  { key: 'relaxation', icon: '💆', label: '休闲放松' },
  { key: 'nightlife', icon: '🌃', label: '夜生活' },
  { key: 'family', icon: '👨‍👩‍👧', label: '亲子旅行' },
];

function renderStyleChips(selectedStyles) {
  return TRAVEL_STYLES.map(s =>
    `<span class="style-chip${selectedStyles.includes(s.key) ? ' selected' : ''}" data-style="${s.key}" onclick="event.stopPropagation();this.classList.toggle('selected')">${s.icon} ${s.label}</span>`
  ).join('');
}

function styleLabel(key) { const s = TRAVEL_STYLES.find(t => t.key === key); return s ? s.icon + ' ' + s.label : key; }

function showTripForm(trip = null) {
  const isEdit = !!trip;
  const data = trip || { name: '', country: '', startDate: '', endDate: '', budget: '', travelers: '1', notes: '', tripType: 'city' };
  showModal(
    isEdit ? '✏️ 编辑旅行' : '✈️ 新建旅行',
    `<div class="form-row">
      <div class="form-group"><label class="form-label">目的地 *</label><input class="form-input" id="tf-name" value="${escHtml(data.name)}" placeholder="例如：东京"></div>
      <div class="form-group"><label class="form-label">国家/地区</label><input class="form-input" id="tf-country" value="${escHtml(data.country)}" placeholder="例如：日本"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">开始日期 *</label><input class="form-input" type="date" id="tf-start" value="${data.startDate}"></div>
      <div class="form-group"><label class="form-label">结束日期 *</label><input class="form-input" type="date" id="tf-end" value="${data.endDate}"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">预算 (¥)</label><input class="form-input" type="number" id="tf-budget" value="${data.budget}" placeholder="0" min="0"></div>
      <div class="form-group"><label class="form-label">旅行人数</label><input class="form-input" type="number" id="tf-travelers" value="${data.travelers}" min="1" max="50"></div>
    </div>
    <div class="form-group"><label class="form-label">预算类型</label>
      <select class="form-select" id="tf-budget-type">
        <option value="personal" ${data.budgetType !== 'team' ? 'selected' : ''}>👤 个人预算（每人 ¥ × 人数 = 总预算）</option>
        <option value="team" ${data.budgetType === 'team' ? 'selected' : ''}>👥 团队预算（所有人合计的总预算）</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">旅行类型</label>
      <select class="form-select" id="tf-type">
        <option value="city" ${data.tripType === 'city' ? 'selected' : ''}>🏙️ 城市观光</option>
        <option value="beach" ${data.tripType === 'beach' ? 'selected' : ''}>🏖️ 海滩度假</option>
        <option value="mountain" ${data.tripType === 'mountain' ? 'selected' : ''}>🏔️ 户外探险</option>
        <option value="business" ${data.tripType === 'business' ? 'selected' : ''}>💼 商务出行</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">旅行风格偏好（可多选）</label>
      <div class="style-chips" id="tf-styles">
        ${renderStyleChips(data.travelStyles || [])}

/* =============================================
   AI TRAVEL PLAN GENERATION
   ============================================= */
async function generateAIPlan(trip, onStatus) {
  const config = getLlmConfig();
  if (!config.apiKey) {
    showToast('⚠️ 请先在侧边栏设置 API Key');
    showSettingsModal();
    return;
  }

  const days = Object.keys(trip.itinerary).length;
  const styleText = (trip.travelStyles || []).length > 0
    ? (trip.travelStyles || []).map(k => styleLabel(k)).join('、')
    : '综合体验';
  const budgetTypeText = (trip.budgetType || 'personal') === 'personal'
    ? `个人预算每人 ¥${trip.budget || 0}（共 ${trip.travelers} 人）`
    : `团队总预算 ¥${trip.budget || 0}（共 ${trip.travelers} 人，人均 ¥${trip.travelers > 0 ? Math.round((trip.budget || 0) / trip.travelers) : 0}）`;

  const tripTypeLabels = { city: '城市观光', beach: '海滩度假', mountain: '户外探险', business: '商务出行' };

  const prompt = `你是一位资深的旅行规划专家。请为以下旅行制定一份极其详细的每日计划。

【基本信息】
- 目的地：${trip.name}${trip.country ? '，' + trip.country : ''}
- 日期：${trip.startDate} 至 ${trip.endDate}（共 ${days} 天）
- 人数：${trip.travelers} 人
- 预算：${budgetTypeText}
- 旅行类型：${tripTypeLabels[trip.tripType] || trip.tripType}
- 旅行风格偏好：${styleText}

【要求】
1. 每天的计划要具体到：具体的景点名称、具体的餐厅名称（含推荐菜品）、具体的活动
2. 每天分上午(09:00)、中午(12:00)、下午(14:00)、晚上(18:00)四个时段
3. 每个活动写明具体地点和预估费用(人民币)
4. 活动类型用英文：attraction(景点), food(餐饮), transport(交通), hotel(住宿), photo(拍照), shopping(购物), other(其他)
5. 所有景点、餐厅、活动名称必须真实存在，不要编造
6. 根据旅行风格偏好调整侧重方向
7. 每天总费用控制在预算范围内

请严格按照以下JSON格式返回，不要添加任何其他文字：
\`\`\`json
{
  "days": [
    {
      "day": "Day 1",
      "summary": "第一天概要（一句话）",
      "activities": [
        {"time": "09:00", "title": "具体景点/餐厅名称", "type": "attraction", "location": "具体地址或区域", "description": "简短介绍和游玩建议", "cost": 100}
      ]
    }
  ]
}
\`\`\``;

  if (onStatus) onStatus('正在连接 AI 服务...');

  try {
    let apiUrl, headers, body;

    if (config.provider === 'anthropic') {
      apiUrl = 'https://api.anthropic.com/v1/messages';
      headers = {
        'Content-Type': 'application/json',
        'x-api-key': config.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      };
      body = JSON.stringify({
        model: config.model || 'claude-sonnet-5-20251001',
        max_tokens: 4096,
        messages: [{ role: 'user', content: prompt }],
      });
    } else if (config.provider === 'deepseek') {
      apiUrl = 'https://api.deepseek.com/v1/chat/completions';
      headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${config.apiKey}`,
      };
      body = JSON.stringify({
        model: config.model || 'deepseek-chat',
        max_tokens: 4096,
        messages: [{ role: 'user', content: prompt }],
      });
    } else {
      apiUrl = 'https://api.openai.com/v1/chat/completions';
      headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${config.apiKey}`,
      };
      body = JSON.stringify({
        model: config.model || 'gpt-4o',
        max_tokens: 4096,
        messages: [{ role: 'user', content: prompt }],
      });
    }

    if (onStatus) onStatus('AI 正在规划行程...');

    const res = await fetch(apiUrl, { method: 'POST', headers, body });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`API 请求失败 (${res.status}): ${errText.slice(0, 200)}`);
    }

    const data = await res.json();

    if (onStatus) onStatus('正在解析行程计划...');

    // Parse response
    let content;
    if (config.provider === 'anthropic') {
      content = data.content?.[0]?.text || '';
    } else {
      content = data.choices?.[0]?.message?.content || '';
    }

    // Extract JSON from markdown code blocks
    const jsonMatch = content.match(/```json\s*([\s\S]*?)```/) || content.match(/```\s*([\s\S]*?)```/);
    const jsonStr = jsonMatch ? jsonMatch[1].trim() : content.trim();

    let plan;
    try {
      plan = JSON.parse(jsonStr);
    } catch (e) {
      // Try to find JSON object
      const objMatch = jsonStr.match(/\{[\s\S]*\}/);
      if (objMatch) plan = JSON.parse(objMatch[0]);
      else throw new Error('无法解析 AI 返回的计划');
    }

    if (!plan.days || !Array.isArray(plan.days)) {
      throw new Error('AI 返回格式不正确，缺少 days 数组');
    }

    // Import the plan into the trip itinerary
    let importedCount = 0;
    plan.days.forEach(dayPlan => {
      const dayKey = dayPlan.day;
      if (!trip.itinerary[dayKey]) {
        // Try matching by index
        const dayKeys = Object.keys(trip.itinerary).sort();
        const idx = parseInt(dayKey.replace('Day ', '')) - 1;
        if (idx >= 0 && idx < dayKeys.length) {
          trip.itinerary[dayKeys[idx]] = [];
          dayPlan.activities.forEach(a => {
            trip.itinerary[dayKeys[idx]].push({
              id: genActId(),
              time: a.time || '',
              title: a.title || '',
              description: a.description || '',
              location: a.location || '',
              cost: Number(a.cost) || 0,
              type: a.type || 'other',
              aiGenerated: true,
            });
            importedCount++;
          });
        }
      } else {
        trip.itinerary[dayKey] = [];
        dayPlan.activities.forEach(a => {
          trip.itinerary[dayKey].push({
            id: genActId(),
            time: a.time || '',
            title: a.title || '',
            description: a.description || '',
            location: a.location || '',
            cost: Number(a.cost) || 0,
            type: a.type || 'other',
            aiGenerated: true,
          });
          importedCount++;
        });
      }
    });

    saveState();
    if (onStatus) onStatus(`✅ 完成！共生成 ${importedCount} 个活动`);
    return { success: true, count: importedCount, plan };
  } catch (e) {
    console.error('AI generation error:', e);
    showToast(`❌ AI 生成失败：${e.message}`);
    return { success: false, error: e.message };
  }
}

   IMAGE FETCHING (Free APIs)
   ============================================= */

// Photo cache to avoid repeated API calls
const photoCache = {};

/**
 * Fetch destination photos from multiple free sources.
 * Uses Wikipedia for lead image + Unsplash-style search via Pexels fallback.
 */
async function fetchDestinationPhotos(query, count = 6) {
  const cacheKey = `photos_${query}_${count}`;
  if (photoCache[cacheKey]) return photoCache[cacheKey];

  const photos = [];

  // Source 1: Wikipedia page image (always try this — free, no API key)
  try {
    const wpUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
    const wpRes = await fetch(wpUrl);
    if (wpRes.ok) {
      const wpData = await wpRes.json();
      if (wpData.thumbnail && wpData.thumbnail.source) {
        photos.push({
          url: wpData.thumbnail.source,
          credit: `Wikipedia — ${wpData.title}`,
          title: wpData.title
        });
      }
      // Also try to get the original image
      if (wpData.originalimage && wpData.originalimage.source) {
        photos.push({
          url: wpData.originalimage.source,
          credit: `Wikipedia — ${wpData.title}`,
          title: wpData.title
        });
      }
    }
  } catch (e) { /* ignore */ }

  // Source 2: Try Pexels API (free, 200 req/hour — note: requires key in production, but the search works via their CDN for embedding)
  // We'll use a direct image approach via various free sources
  try {
    // Try to get more images from Wikipedia "page/media" endpoint
    const mediaUrl = `https://en.wikipedia.org/api/rest_v1/page/media-list/${encodeURIComponent(query)}`;
    const mediaRes = await fetch(mediaUrl);
    if (mediaRes.ok) {
      const mediaData = await mediaRes.json();
      const items = (mediaData.items || []).filter(item =>
        item.type === 'image' && item.title && !item.title.includes('icon') && !item.title.includes('flag') && !item.title.includes('map')
      ).slice(0, count);
      for (const item of items) {
        // Get the image URL from the title
        const srcUrl = `https://en.wikipedia.org/api/rest_v1/page/media/${encodeURIComponent(item.title.replace(/^File:/, ''))}`;
        try {
          const srcRes = await fetch(srcUrl);
          if (srcRes.ok) {
            const srcData = await srcRes.json();
            const bestSrc = srcData.preferred?.url || srcData.original?.url;
            if (bestSrc && !photos.find(p => p.url === bestSrc)) {
              photos.push({ url: bestSrc, credit: `Wikipedia`, title: item.title });
            }
          }
        } catch (e) { /* skip */ }
      }
    }
  } catch (e) { /* ignore */ }

  // Source 3: Use a generic destination image fallback with Unsplash's public embed
  const unsplashQueries = [
    `${query} city landscape`,
    `${query} travel`,
    `${query} landmark`,
  ];
  for (const uq of unsplashQueries) {
    if (photos.length >= count) break;
    // Use a reliable free image CDN
    photos.push({
      url: `https://source.unsplash.com/800x600/?${encodeURIComponent(uq)}`,
      credit: 'Unsplash',
      title: uq
    });
  }

  // Deduplicate by URL
  const unique = photos.filter((p, i, arr) => arr.findIndex(x => x.url === p.url) === i).slice(0, count);
  photoCache[cacheKey] = unique;
  return unique;
}

/**
 * Get a single hero image for a destination.
 */
async function fetchHeroPhoto(query) {
  const photos = await fetchDestinationPhotos(query, 3);
  return photos.length > 0 ? photos[0] : null;
}

/* =============================================
   WIKIPEDIA DESTINATION INFO (Free API)
   ============================================= */
const wikiCache = {};

async function fetchWikipediaSummary(query, lang = 'zh') {
  const cacheKey = `wiki_${query}_${lang}`;
  if (wikiCache[cacheKey]) return wikiCache[cacheKey];

  try {
    // Try Chinese Wikipedia first
    const url = `https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
    const res = await fetch(url);
    if (!res.ok) {
      // Fallback to English
      const enUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
      const enRes = await fetch(enUrl);
      if (!enRes.ok) return null;
      const data = await enRes.json();
      wikiCache[cacheKey] = {
        title: data.title,
        extract: data.extract,
        description: data.description,
        thumbnail: data.thumbnail?.source || null,
        url: data.content_urls?.desktop?.page || null,
        lang: 'en'
      };
      return wikiCache[cacheKey];
    }
    const data = await res.json();
    wikiCache[cacheKey] = {
      title: data.title,
      extract: data.extract,
      description: data.description,
      thumbnail: data.thumbnail?.source || null,
      url: data.content_urls?.desktop?.page || null,
      lang: lang
    };

function findCityCode(locationName) {
  if (WEATHER_CN_CITY_CODES[locationName]) return WEATHER_CN_CITY_CODES[locationName];
  for (const [key, val] of Object.entries(WEATHER_CN_CITY_CODES)) {
    if (locationName.includes(key) || key.includes(locationName)) return val;
  }
  return null;
}

async function fetchWeatherCN(locationName) {
  const cityCode = findCityCode(locationName);
  if (!cityCode || cityCode.length < 8) return null; // Only numeric codes work with weather.com.cn

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 6000);
    const url = `https://www.weather.com.cn/weather1d/${cityCode}.shtml`;
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);
    if (!res.ok) return null;
    const html = await res.text();

    // Parse HTML to extract weather data
    const forecast = [];
    const tempRegex = /<span class="tem">([^<]+)<\/span>/g;
    const weaRegex = /<span class="wea">([^<]+)<\/span>/g;
    const winRegex = /<span class="win">[^<]*<span[^>]*>([^<]+)<\/span>/g;

    // Simple parsing of weather.com.cn 7-day forecast table
    const dateRegex = /<h1>(\d+日[^<]*)<\/h1>/g;
    const rowRegex = /<tr[^>]*class="lv[^"]*"[^>]*>([\s\S]*?)<\/tr>/g;
    const cellRegex = /<td[^>]*>([\s\S]*?)<\/td>/g;

    const tableMatch = html.match(/<table[^>]*class="table[^"]*"[^>]*>([\s\S]*?)<\/table>/);
    if (tableMatch) {
      const rows = tableMatch[1].match(/<tr[^>]*>[\s\S]*?<\/tr>/g) || [];
      for (const row of rows.slice(1, 8)) { // skip header, max 7 days
        const cells = row.match(/<td[^>]*>[\s\S]*?<\/td>/g) || [];
        if (cells.length >= 5) {
          const dateText = cells[0].replace(/<[^>]+>/g, '').trim();
          const weatherText = cells[1].replace(/<[^>]+>/g, '').trim();
          const tempHigh = cells[2].replace(/<[^>]+>/g, '').trim();
          const tempLow = cells[4].replace(/<[^>]+>/g, '').trim();
          forecast.push({
            date: dateText,
            weather: weatherText,
            tempMax: parseInt(tempHigh) || 0,
            tempMin: parseInt(tempLow) || 0,
          });
        }
      }
      if (forecast.length > 0) {
        return { source: 'weather.com.cn', forecast };
      }
    }
    return null;
  } catch (e) {
    return null;
  }
}

async function fetchWeatherOpenMeteo(locationName, startDate, endDate) {
  try {
    const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(locationName)}&count=1&language=zh`;
    const geoRes = await fetch(geoUrl);
    if (!geoRes.ok) return null;
    const geoData = await geoRes.json();
    if (!geoData.results || geoData.results.length === 0) return null;
    const loc = geoData.results[0];

    const days = daysBetween(startDate, endDate);
    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=auto&forecast_days=${Math.min(days + 3, 16)}`;
    const weatherRes = await fetch(weatherUrl);
    if (!weatherRes.ok) return null;
    const weatherData = await weatherRes.json();

    const weatherCodes = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️',
      51: '🌦️', 53: '🌦️', 55: '🌦️', 61: '🌧️', 63: '🌧️', 65: '🌧️',
      71: '🌨️', 73: '🌨️', 75: '🌨️', 80: '🌧️', 81: '🌧️', 82: '🌧️',
      85: '🌨️', 86: '🌨️', 95: '⛈️', 96: '⛈️', 99: '⛈️'
    };

    const daily = weatherData.daily;
    const forecast = [];
    for (let i = 0; i < Math.min(days, daily.time.length); i++) {
      forecast.push({
        date: daily.time[i],
        tempMax: Math.round(daily.temperature_2m_max[i]),
        tempMin: Math.round(daily.temperature_2m_min[i]),
        rainProb: daily.precipitation_probability_max[i],
        icon: weatherCodes[daily.weathercode[i]] || '🌡️'
      });
    }

    return {
      source: 'open-meteo',
      location: `${loc.name}${loc.country ? ', ' + loc.country : ''}`,
      forecast,
      lat: loc.latitude,
      lon: loc.longitude,
    };
  } catch (e) {
    return null;
  }
}

async function fetchWeather(locationName, startDate, endDate) {
  const cacheKey = `weather_${locationName}_${startDate}_${endDate}`;
  if (weatherCache[cacheKey]) return weatherCache[cacheKey];

  // Try weather.com.cn first
  const cnResult = await fetchWeatherCN(locationName);
  if (cnResult && cnResult.forecast && cnResult.forecast.length > 0) {
    const formattedForecast = cnResult.forecast.slice(0, 10).map((d, i) => {
      const date = new Date(startDate + 'T00:00:00');
      date.setDate(date.getDate() + i);
      return {
        date: date.toISOString().slice(0, 10),
        tempMax: d.tempMax,
        tempMin: d.tempMin,
        rainProb: 0,
        icon: d.weather || '🌡️',
      };
    });
    const result = {
      location: locationName,
      source: 'weather.com.cn',
      forecast: formattedForecast,
    };
    weatherCache[cacheKey] = result;
    return result;
  }

  // Fallback to Open-Meteo
  const omResult = await fetchWeatherOpenMeteo(locationName, startDate, endDate);
  if (omResult) {
    weatherCache[cacheKey] = omResult;
    return omResult;
  }

  // Both failed — return the special error message
  return { error: true, message: '神机妙算失效了，过几天再来看看吧' };
}

function generateDailySuggestions(attractions, days, tripType) {
  const suggestions = [];
  const attrs = [...attractions];
  const perDay = Math.ceil(attrs.length / days);

  for (let d = 0; d < days; d++) {
    const dayAttrs = attrs.slice(d * perDay, (d + 1) * perDay);
    const morning = dayAttrs[0];
    const afternoon = dayAttrs[1] || attrs[d % attrs.length];
    const evening = tripType === 'city' ? '当地特色餐厅晚餐' : tripType === 'beach' ? '海滩日落散步' : '休息放松';

    suggestions.push({
      day: `Day ${d + 1}`,
      activities: [
        { time: '09:00', title: morning ? `参观${morning.name}` : '探索当地', type: 'attraction' },
        { time: '12:00', title: '午餐 — 品尝当地美食', type: 'food' },
        { time: '14:00', title: afternoon ? `游览${afternoon.name}` : '自由活动', type: 'attraction' },
        { time: '18:00', title: evening, type: tripType === 'city' ? 'food' : 'other' },
      ]
    });
  }
  return suggestions;
}

function render() {

  const trip = getActiveTrip();
  const tripViews = ['explore', 'itinerary', 'budget', 'packing'];
  document.querySelectorAll('.nav-item[data-view]').forEach(btn => {
    const view = btn.dataset.view;
    btn.classList.toggle('active', state.currentView === view);
    if (tripViews.includes(view)) {

function refreshExplore() {
  // Clear caches for current trip
  const trip = getActiveTrip();
  if (!trip) return;
  const searchQuery = trip.country ? `${trip.name} ${trip.country}` : trip.name;
  delete photoCache[`photos_${searchQuery}_8`];
  delete wikiCache[`wiki_${searchQuery}_zh`];
  delete wikiCache[`wiki_${searchQuery}_en`];
  delete weatherCache[`weather_${searchQuery}_${trip.startDate}_${trip.endDate}`];
  delete guideCache[`guide_${trip.name}_${trip.country}_${trip.tripType}_${Object.keys(trip.itinerary).length}`];
  render();
}

function addAttractionToItinerary(tripId, name) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip) return;
  // Find the first day with fewest activities
  const days = Object.keys(trip.itinerary).sort();
  let targetDay = days[0];
  let minCount = Infinity;
  days.forEach(d => {
    const count = trip.itinerary[d].length;
    if (count < minCount) { minCount = count; targetDay = d; }
  });
  showActivityForm(tripId, targetDay, {
    time: '09:00', title: name, description: '', location: '', cost: '', type: 'attraction'
  });
}

function importDaySuggestions(tripId, dayKey) {
  const trip = state.trips.find(t => t.id === tripId);
  if (!trip) return;
  if (!lastGuide) { showToast('⚠️ 请先加载旅行攻略'); return; }
  const dayGuide = lastGuide.suggestedItinerary.find(d => d.day === dayKey);
  if (!dayGuide) { showToast('⚠️ 未找到该天的建议'); return; }
  if (!trip.itinerary[dayKey]) {
    showToast('⚠️ 该日期超出范围，请先调整旅行日期');
    return;
  }
  dayGuide.activities.forEach(a => {
    trip.itinerary[dayKey].push({
      id: genActId(),
      time: a.time || '',
      title: a.title,
      description: a.description || '',
      location: a.location || '',
      cost: Number(a.cost) || 0,
      type: a.type || 'other'
    });
  });
  saveState();
  showToast(`✅ 已将 ${dayGuide.activities.length} 个活动导入 ${dayKey}`);
  render();
}

/* =============================================
   ITINERARY VIEW
   ============================================= */
function renderItinerary(main, trip) {
  const days = Object.keys(trip.itinerary).sort((a, b) => {
    const na = parseInt(a.replace('Day ', '')), nb = parseInt(b.replace('Day ', ''));
    return na - nb;
  });

  const activeDayKey = 'activeDay_' + trip.id;
  let activeDay = sessionStorage.getItem(activeDayKey);
  if (!activeDay || !trip.itinerary[activeDay]) {
    activeDay = days[0] || 'Day 1';
    sessionStorage.setItem(activeDayKey, activeDay);
  }

  const tabs = days.map((day, i) => {
    const date = getDayDate(trip.startDate, i);
    const count = (trip.itinerary[day] || []).length;
    return `<button class="tab ${day === activeDay ? 'active' : ''}" data-day="${day}" onclick="switchItineraryDay('${trip.id}', '${day}')">${day} · ${formatDate(date)}${count > 0 ? ` (${count})` : ''}</button>`;
  }).join('');

  const activities = trip.itinerary[activeDay] || [];
  const dayCost = activities.reduce((sum, a) => sum + (a.cost || 0), 0);

  const activityHtml = activities.length === 0 ? `
    <div style="text-align:center;padding:48px;color:var(--text-muted)">
      <div style="font-size:48px;margin-bottom:12px">📝</div>
      <p style="font-size:15px">这一天还没有安排活动</p>
      <button class="btn btn-primary" style="margin-top:16px" onclick="showActivityForm('${trip.id}','${activeDay}')">➕ 添加活动</button>
    </div>` : `
    <div class="activity-list">
      ${activities.map((act, idx) => `
        <div class="activity-item">
          <div class="activity-type">${actTypeIcon(act.type)}</div>
          ${act.time ? `<div class="activity-time">${act.time}</div>` : ''}
          <div class="activity-info">
            <h4>${escHtml(act.title)}${act.aiGenerated ? '<span class="ai-badge">🤖 AI推荐</span>' : ''}</h4>
            ${act.description ? `<p>${escHtml(act.description)}</p>` : ''}
            ${act.location ? `<div class="location">📍 ${escHtml(act.location)}</div>` : ''}
          </div>
          ${act.cost > 0 ? `<div class="activity-cost">${formatCurrency(act.cost)}</div>` : ''}
          <div class="activity-actions">
            <button class="btn btn-xs btn-secondary" onclick="moveActivity('${trip.id}','${activeDay}','${act.id}',-1)" ${idx === 0 ? 'disabled' : ''}>↑</button>
            <button class="btn btn-xs btn-secondary" onclick="moveActivity('${trip.id}','${activeDay}','${act.id}',1)" ${idx === activities.length - 1 ? 'disabled' : ''}>↓</button>
            <button class="btn btn-xs btn-secondary" onclick="editActivityById('${trip.id}','${activeDay}','${act.id}')">✏️</button>
            <button class="btn btn-xs btn-danger" onclick="deleteActivity('${trip.id}','${activeDay}','${act.id}');showToast('✅ 活动已删除')">✕</button>
          </div>
        </div>
      `).join('')}
    </div>`;

  const totalActivities = Object.values(trip.itinerary).reduce((sum, acts) => sum + acts.length, 0);
  const totalItinCost = getItineraryCost(trip);

  main.innerHTML = `
    <div class="page-header">
      <div>
        <button class="btn btn-sm btn-secondary" onclick="state.currentView='dashboard';render()" style="margin-bottom:8px">← 返回</button>
        <h1 class="page-title">${escHtml(trip.name)} · 行程</h1>
        <p class="page-subtitle">${days.length} 天 · ${totalActivities} 个活动${totalItinCost > 0 ? ` · 预估 ${formatCurrency(totalItinCost)}` : ''}</p>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-info" onclick="generateAIPlanForTrip('${trip.id}')">🤖 AI 生成计划</button>
        <button class="btn btn-primary" onclick="showActivityForm('${trip.id}','${activeDay}')">➕ 添加活动</button>
      </div>
    </div>
    <div class="card" style="padding:16px 20px">
      <div class="tabs">${tabs}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <h3 style="font-size:15px">${activeDay} · ${formatDate(getDayDate(trip.startDate, days.indexOf(activeDay)))}</h3>
        <span style="font-size:13px;color:var(--text-secondary)">${activities.length} 个活动${dayCost > 0 ? ` · ${formatCurrency(dayCost)}` : ''}</span>
      </div>
      ${activityHtml}
    </div>`;

  setTimeout(() => {
    const activeTab = document.querySelector(`.tab[data-day="${activeDay}"]`);
    if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 50);
}

function switchItineraryDay(tripId, day) {
  sessionStorage.setItem('activeDay_' + tripId, day);
  render();
}

function getDayDate(startDate, dayIndex) {
  if (!startDate) return '';
  const d = new Date(startDate + 'T00:00:00');
  d.setDate(d.getDate() + dayIndex);
  return d.toISOString().slice(0, 10);
}

function renderBudget(main, trip) {
  const totalSpent = getTotalSpent(trip);

  const expTotal = trip.expenses.reduce((sum, e) => sum + e.amount, 0);
  const isPersonal = (trip.budgetType || 'personal') === 'personal';
  const actualTotal = isPersonal ? (trip.budget || 0) * (trip.travelers || 1) : (trip.budget || 0);
  const perPerson = isPersonal ? (trip.budget || 0) : Math.round((trip.budget || 0) / (trip.travelers || 1));
  const budgetUsage = actualTotal > 0 ? Math.round((totalSpent / actualTotal) * 100) : 0;
  const remaining = actualTotal - totalSpent;
  const budgetTypeLabel = isPersonal ? '👤 个人预算' : '👥 团队预算';

  const categoryRows = EXPENSE_CATEGORIES.map(cat => {
    const spent = getCategoryTotal(trip, cat);
    const pct = actualTotal > 0 ? Math.round((spent / actualTotal) * 100) : 0;
    return `
      <div class="category-row">
        <div class="category-icon">${CATEGORY_LABELS[cat].split(' ')[0]}</div>
        <div class="category-info">
          <div class="category-name">${CATEGORY_LABELS[cat].split(' ').slice(1).join(' ')}</div>
          <div class="category-amounts">${formatCurrency(spent)}</div>
        </div>
        <div class="category-bar">
          <div class="progress-bar"><div class="progress-fill ${pct > 20 ? 'danger' : pct > 10 ? 'warning' : 'safe'}" style="width:${Math.min(pct * 4, 100)}%"></div></div>
        </div>
      </div>`;
  }).join('');

  const expensesHtml = trip.expenses.length === 0
    ? '<div style="text-align:center;padding:20px;color:var(--text-muted)">暂无手动支出记录</div>'
    : trip.expenses.sort((a,b) => (b.date||'').localeCompare(a.date||'')).map(e => `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span style="font-size:16px">${CATEGORY_LABELS[e.category].split(' ')[0]}</span>
        <span style="flex:1;font-weight:500">${escHtml(e.note || CATEGORY_LABELS[e.category].split(' ').slice(1).join(' '))}</span>
        ${e.date ? `<span style="color:var(--text-muted)">${e.date}</span>` : ''}
        <span style="font-weight:600;color:var(--danger)">-${formatCurrency(e.amount)}</span>
        <button class="btn btn-xs btn-danger" onclick="deleteExpense('${trip.id}','${e.id}');showToast('已删除')">✕</button>
      </div>`).join('');

  main.innerHTML = `
    <div class="page-header">
      <div>
        <button class="btn btn-sm btn-secondary" onclick="state.currentView='dashboard';render()" style="margin-bottom:8px">← 返回</button>
        <h1 class="page-title">${escHtml(trip.name)} · 预算</h1>
        <p class="page-subtitle">${budgetTypeLabel} · ${trip.travelers} 人</p>
      </div>
      <button class="btn btn-primary" onclick="showExpenseForm('${trip.id}')">💸 添加支出</button>
    </div>
    <div class="budget-summary">
      <div class="budget-stat">
        <div class="label">${isPersonal ? '每人预算' : '总预算'}</div>
        <div class="value">${formatCurrency(trip.budget)}</div>
        ${isPersonal ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">× ${trip.travelers} 人</div>` : ''}
      </div>
      <div class="budget-stat">
        <div class="label">${isPersonal ? '总预算' : '人均预算'}</div>
        <div class="value">${isPersonal ? formatCurrency(actualTotal) : formatCurrency(perPerson)}</div>
      </div>
      <div class="budget-stat">
        <div class="label">已花费</div>
        <div class="value ${remaining < 0 ? 'over' : ''}">${formatCurrency(totalSpent)}</div>
        <div class="progress-bar"><div class="progress-fill ${budgetUsage > 100 ? 'danger' : budgetUsage > 80 ? 'warning' : 'safe'}" style="width:${Math.min(budgetUsage, 100)}%"></div></div>

    ${itinCost > 0 ? `<div style="margin-bottom:20px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text-secondary)">📋 行程活动预估费用：<strong>${formatCurrency(itinCost)}</strong>（已计入总额）</div>` : ''}
